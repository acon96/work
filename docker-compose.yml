services:
  # ─────────────────────────────────────────────────────────────────────────────
  # work — the hardened pi sandbox
  # ─────────────────────────────────────────────────────────────────────────────
  work:
    build:
      context: .
      dockerfile: Dockerfile
    image: work-sandbox:latest
    container_name: work
    depends_on:
      - searxng

    # ── volumes ────────────────────────────────────────────────────────────────
    volumes:
      # Persistent workspace shared with the host.
      - type: bind
        source: ${WORKSPACE_DIR:-./agent-workspace}
        target: /workspace
      # Pi global settings (all projects) — per pi.dev docs: ~/.pi/agent/settings.json
      - type: bind
        source: .pi/agent/settings.json
        target: /home/agent/.pi/agent/settings.json
      # Pi models configuration (llama-swap field mappings, etc.)
      - type: bind
        source: .pi/agent/models.json
        target: /home/agent/.pi/agent/models.json
      # Persistent pi session data (survives container rebuilds)
      - type: bind
        source: .pi/sessions
        target: /home/agent/.pi/sessions
      # Pi Web state: projects list + session daemon socket
      - type: bind
        source: .pi/web
        target: /home/agent/.pi/web

    # ── ports ──────────────────────────────────────────────────────────────────
    ports:
      - "${PI_WEB_PORT:-8504}:8504"

    # ── environment ────────────────────────────────────────────────────────────
    environment:
      # "allowlist" (default) or "open-get"
      NETWORK_MODE: ${NETWORK_MODE:-allowlist}
      # SearXNG search endpoint (set to "searxng" for docker-compose, or a URL)
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      # Enable optional URL filtering/rewrite addon for Mode B
      URL_REWRITE_ENABLED: ${URL_REWRITE_ENABLED:-false}
      # Proxy allowlist (can override the file with inline env var)
      PROXY_ALLOWLIST: ${PROXY_ALLOWLIST:-}
      # Sudo allowlist (can override the file with inline env var)
      SUDO_ALLOWLIST: ${SUDO_ALLOWLIST:-}
      # Llama-swap URL (for dynamic model discovery).
      LLAMA_SWAP_URL: ${LLAMA_SWAP_URL:-}
      # Pi Web web server port
      PI_WEB_PORT: ${PI_WEB_PORT:-8504}
      # Pi Web web server bind host (must be 0.0.0.0 inside the container so
      # Docker's port mapping can reach it; restrict exposure via published ports)
      PI_WEB_HOST: ${PI_WEB_HOST:-0.0.0.0}
      PI_WEB_DATA_DIR: /home/agent/.pi/web

    # ── security ───────────────────────────────────────────────────────────────
    cap_drop:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # searxng — open-source metasearch engine
  # ─────────────────────────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # llama-swap — dynamic LLM model swapping (disabled by default)
  # Start with: docker compose --profile llama-swap up
  # ─────────────────────────────────────────────────────────────────────────────
  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:latest
    container_name: llama-swap
    profiles:
      - llama-swap
    volumes:
      - ./config/llama-swap.yml:/app/config.yml:ro
    command: ["--config", "/app/config.yml"]
    ports:
      - 8080
    restart: unless-stopped

# ── named volumes ──────────────────────────────────────────────────────────────
volumes:
  searxng-data:
    driver: local
