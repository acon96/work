services:
  # ─────────────────────────────────────────────────────────────────────────────
  # work — the hardened pi sandbox
  # ─────────────────────────────────────────────────────────────────────────────
  work:
    build:
      context: .
      dockerfile: Dockerfile
    image: work-sandbox:latest
    container_name: work
    depends_on:
      - searxng

    # ── volumes ────────────────────────────────────────────────────────────────
    volumes:
      # Persistent workspace shared with the host.
      - type: bind
        source: ${WORKSPACE_DIR:-./workspace}
        target: /workspace
      # User-editable config (allowlists, etc.).
      - type: bind
        source: ${CONFIG_DIR:-./config}
        target: /config
      # Persistent pi session data and settings (survives container rebuilds).
      - type: volume
        source: pi-data
        target: /home/agent/.pi

    # ── ports ──────────────────────────────────────────────────────────────────
    ports:
      - "${PI_PORT:-4000}:4000"

    # ── environment ────────────────────────────────────────────────────────────
    environment:
      # "allowlist" (default) or "open-get"
      NETWORK_MODE: ${NETWORK_MODE:-allowlist}
      # SearXNG search endpoint (set to "searxng" for docker-compose, or a URL)
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      # Pass through API keys to the pi server
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Enable optional URL filtering/rewrite addon for Mode B
      URL_REWRITE_ENABLED: ${URL_REWRITE_ENABLED:-false}
      # Proxy allowlist (can override the file with inline env var)
      PROXY_ALLOWLIST: ${PROXY_ALLOWLIST:-}
      # Sudo allowlist (can override the file with inline env var)
      SUDO_ALLOWLIST: ${SUDO_ALLOWLIST:-}

    # ── security ───────────────────────────────────────────────────────────────
    cap_drop:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────────
  # searxng — open-source metasearch engine
  # ─────────────────────────────────────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - searxng-data:/etc/searxng
      - ./config/searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    restart: unless-stopped

# ── named volumes ──────────────────────────────────────────────────────────────
volumes:
  pi-data:
    driver: local
  searxng-data:
    driver: local
