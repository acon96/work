        ${spec-ngram}
        ${split-tensor}
        --reasoning-budget-message "-- Ok, I am done thinking for now. I need to make a tool call or respond to the user."
        --slot-save-path /app/kv-cache
    ttl: 1800
    metadata:
      context_len: ${224k}
      max_tokens: ${32k}
      thinking: true
