# ── dnsmasq: Mode A — default-deny ───────────────────────────────────────────
# All hostnames resolve to 0.0.0.0 by default.  Only domains present in
# /config/proxy-allowlist.txt receive real upstream DNS lookups, and only
# those lookups are forwarded through the system resolver.
#
# This file is templated at container start-up by entrypoint.sh, which
# reads /config/proxy-allowlist.txt and appends server=/<domain>/8.8.8.8
# directives for each allowlisted domain.

# Refuse to act as a general recursive resolver.
no-resolv
no-poll

# Default-deny: return 0.0.0.0 for all queries.
address=/#/0.0.0.0

# Upstream server used for allowlisted domains (see entrypoint.sh for the
# per-domain server= lines that are appended at runtime).
server=8.8.8.8

# Listen only on loopback.
listen-address=127.0.0.1
bind-interfaces

# Logging.
log-queries
log-facility=-
