# ── dnsmasq: Mode A — default-deny ───────────────────────────────────────────
# All hostnames resolve to 0.0.0.0 by default.  Only domains present in
# /config/proxy-allowlist.txt receive real upstream DNS lookups.
#
# This file is templated at container start-up by entrypoint.sh, which
# reads /config/proxy-allowlist.txt and appends server=/<domain>/ lines
# for each allowlisted domain.

# Don't poll /etc/resolv.conf for changes (we use the static saved copy).
no-poll

# Use the system's upstream DNS servers (saved by entrypoint.sh from the
# original /etc/resolv.conf).
resolv-file=/etc/resolv.conf.upstream
no-hosts

# Listen only on loopback.
listen-address=127.0.0.1
bind-interfaces

# Default-deny: return NXDOMAIN (0.0.0.0) for every hostname not explicitly
# overridden by a server=/<domain>/<upstream> directive below.
address=/#/0.0.0.0

# Logging.
log-queries
log-facility=-
