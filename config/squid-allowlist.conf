# ── squid: Mode A — Allowlist ─────────────────────────────────────────────────
# Only HTTPS CONNECT to domains listed in /config/proxy-allowlist.txt is
# allowed.  HTTP plain-text requests are rejected entirely.  A second
# default-deny layer is provided by dnsmasq.

http_port 3128

# Disable caching to avoid leaking cross-request data.
cache deny all
no_cache deny all

# ACL: destinations whose names appear in the allowlist file.
acl allowed_domains dstdomain "/config/proxy-allowlist.txt"

# Only HTTPS CONNECT tunnelling is permitted (no plain HTTP).
acl CONNECT method CONNECT

# Block everything that is not an allowlisted CONNECT.
http_access deny !CONNECT
http_access deny !allowed_domains
http_access allow CONNECT allowed_domains
http_access deny all

# Suppress the Via / X-Forwarded-For headers to avoid leaking internal info.
via off
forwarded_for delete
request_header_access Via deny all
request_header_access X-Forwarded-For deny all
request_header_access Forwarded deny all

# Run squid with minimal privilege.
cache_effective_user proxy
cache_effective_group proxy

# Logging to files in /var/log/squid (proxy user owns this dir).
access_log /var/log/squid/access.log combined
cache_log /var/log/squid/cache.log
