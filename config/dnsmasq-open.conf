# ── dnsmasq: Mode B — permissive ─────────────────────────────────────────────
# All DNS queries are forwarded upstream.  The proxy (squid SSL bump) is the
# main control layer in this mode.

# Use the system resolver list for upstream servers.
resolv-file=/etc/resolv.conf.upstream

# Listen only on loopback.
listen-address=127.0.0.1
bind-interfaces

# Logging.
log-queries
log-facility=-
