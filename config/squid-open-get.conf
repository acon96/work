# ── squid: Mode B — Open-GET ──────────────────────────────────────────────────
# All domains are reachable, but only GET and HEAD are forwarded.  All
# request headers except a small safe set are stripped.  Query strings are
# rewritten away by the url_rewrite_program helper.  TLS interception (SSL
# bump) is enabled using the build-time CA so the proxy can inspect and
# rewrite HTTPS traffic.

# SSL-bump listening port.
http_port 3128 ssl-bump \
    cert=/etc/squid/ssl-ca.crt \
    key=/etc/squid/ssl-ca.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

# SSL certificate cache.
sslcrtd_program /usr/lib/squid/security_file_certgen \
    -s /var/lib/squid/ssl_db \
    -M 4MB
sslcrtd_children 8 startup=1 idle=1

# Bump every TLS connection.
ssl_bump server-first all

# Disable caching.
cache deny all
no_cache deny all

# ── method restriction ────────────────────────────────────────────────────────
acl safe_methods method GET HEAD
http_access deny !safe_methods
http_access allow safe_methods
http_access deny all

# ── header stripping ──────────────────────────────────────────────────────────
# Deny (remove) all headers, then explicitly allow the safe set.
request_header_access Authorization   deny all
request_header_access Cookie          deny all
request_header_access Proxy-Authorization deny all
request_header_access X-Forwarded-For deny all
request_header_access Via             deny all
request_header_access Forwarded       deny all
request_header_access Referer         deny all
request_header_access X-Real-IP       deny all

# Safe pass-through headers.
request_header_access Host            allow all
request_header_access Accept          allow all
request_header_access Accept-Language allow all
request_header_access Accept-Encoding allow all
request_header_access User-Agent      allow all
request_header_access Cache-Control   allow all
request_header_access Content-Length  allow all
request_header_access If-None-Match   allow all
request_header_access If-Modified-Since allow all

# ── URL rewrite: strip query strings ─────────────────────────────────────────
url_rewrite_program /usr/local/bin/squid-url-rewrite
url_rewrite_children 5 startup=1 idle=1
url_rewrite_concurrency 0

# Hide proxy identity.
via off
forwarded_for delete

# Logging.
access_log stdio:/dev/stdout combined
cache_log stdio:/dev/stderr

cache_effective_user proxy
cache_effective_group proxy
